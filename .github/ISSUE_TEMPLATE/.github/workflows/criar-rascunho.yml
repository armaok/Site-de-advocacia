name: Criar rascunho de artigo do blog

on:
  issues:
    types: [labeled]

jobs:
  criar-rascunho:
    if: github.event.label.name == '✍️ escrever'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Extrair dados do Issue e criar rascunho
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const body = issue.body || '';

            // Extrair campos do formulário do Issue
            function extrairCampo(label, texto) {
              const regex = new RegExp(`### ${label}\\s*\\n([\\s\\S]*?)(?=\\n###|$)`, 'i');
              const match = texto.match(regex);
              return match ? match[1].trim() : '';
            }

            const titulo = extrairCampo('Título do artigo', body) || issue.title.replace('[ARTIGO] ', '');
            const categoria = extrairCampo('Categoria', body) || 'direito-a-saude';
            const autor = extrairCampo('Autor', body) || 'Arnaldo Okamura';
            const ideia = extrairCampo('Ideia central', body) || '';
            const resumo = extrairCampo('Resumo \\(1-2 frases\\)', body) || `Artigo sobre: ${titulo}`;
            const contexto = extrairCampo('Contexto adicional', body) || '';

            // Gerar slug a partir do título
            const slug = titulo
              .toLowerCase()
              .normalize('NFD')
              .replace(/[\u0300-\u036f]/g, '')
              .replace(/[^a-z0-9\s-]/g, '')
              .replace(/\s+/g, '-')
              .replace(/-+/g, '-')
              .trim()
              .substring(0, 60);

            const hoje = new Date().toISOString().split('T')[0];

            // Montar conteúdo do arquivo markdown
            const conteudo = `---
title: ${titulo}
date: "${hoje}"
categoria: ${categoria}
resumo: ${resumo}
autor: ${autor}
rascunho: true
issue: ${issue.number}
---

<!-- 
  RASCUNHO GERADO AUTOMATICAMENTE DO ISSUE #${issue.number}
  Edite este arquivo no Decap CMS ou diretamente no GitHub
  Remova o campo "rascunho: true" quando estiver pronto para publicar
-->

## Ideia central

${ideia}

${contexto ? `## Contexto\n\n${contexto}` : ''}

## Desenvolvimento

<!-- Escreva o artigo completo aqui -->

`;

            const caminho = `src/content/blog/${slug}.md`;

            // Verificar se arquivo já existe
            let sha;
            try {
              const arquivo = await github.rest.repos.getContent({
                owner: context.repo.owner,
                repo: context.repo.repo,
                path: caminho,
              });
              sha = arquivo.data.sha;
            } catch (e) {
              // Arquivo não existe, tudo certo
            }

            // Criar ou atualizar arquivo
            await github.rest.repos.createOrUpdateFileContents({
              owner: context.repo.owner,
              repo: context.repo.repo,
              path: caminho,
              message: `rascunho: ${titulo} (Issue #${issue.number})`,
              content: Buffer.from(conteudo).toString('base64'),
              sha: sha,
            });

            // Comentar no Issue com link para o arquivo
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              body: `✅ **Rascunho criado!**\n\nArquivo gerado em: \`${caminho}\`\n\nPróximos passos:\n1. Abra o [Decap CMS](https://toadvocacia.com.br/admin/) e edite o rascunho\n2. Ou edite diretamente no [GitHub](https://github.com/${context.repo.owner}/${context.repo.repo}/blob/main/${caminho})\n3. Quando publicar, feche este Issue`,
            });

            // Trocar label de "✍️ escrever" para "📝 rascunho"
            await github.rest.issues.removeLabel({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              name: '✍️ escrever',
            });

            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              labels: ['📝 rascunho'],
            });

            console.log(`Rascunho criado: ${caminho}`);
