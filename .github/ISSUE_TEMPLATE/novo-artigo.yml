name: "📝 Novo artigo para o blog"
description: "Capture uma ideia para o blog — do celular ou computador"
title: "[ARTIGO] "
labels: ["💡 ideia"]
body:
  - type: input
    id: titulo
    attributes:
      label: Título do artigo
      description: "Pode ser provisório — ajustamos depois"
      placeholder: "Ex: O que fazer quando o plano nega a fonoaudiologia?"
    validations:
      required: true

  - type: dropdown
    id: categoria
    attributes:
      label: Categoria
      options:
        - planos-de-saude
        - poder-publico
        - terapias
        - medicamentos
        - servidor-publico
        - direito-a-saude
    validations:
      required: true

  - type: dropdown
    id: autor
    attributes:
      label: Autor
      options:
        - Arnaldo Okamura
        - Jady Teixeira
    validations:
      required: true

  - type: textarea
    id: ideia
    attributes:
      label: Ideia central
      description: "O que você quer dizer nesse artigo? Pode ser cru, em tópicos, como veio na cabeça"
      placeholder: |
        - O plano pode limitar fonoaudiologia?
        - Resolução ANS diz que não
        - Caso que atendi semana passada
        - Como entrar com liminar
    validations:
      required: true

  - type: textarea
    id: resumo
    attributes:
      label: Resumo (1-2 frases)
      description: "Aparece na listagem do blog. Pode deixar em branco que eu sugiro um."
      placeholder: "Ex: Entenda por que o plano não pode limitar sessões de fonoaudiologia e como agir quando isso acontece."

  - type: textarea
    id: contexto
    attributes:
      label: Contexto adicional
      description: "Caso real, jurisprudência, lei específica, algo que motivou a ideia"
      placeholder: "Opcional — qualquer coisa que ajude a escrever o artigo"
